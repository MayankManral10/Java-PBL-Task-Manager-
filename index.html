<!DOCTYPE html>
<html>
<head>
    <title>Advanced Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Task Manager</h1>

    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="date" id="dueDate">

    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <button onclick="addTask()">Add</button>

    <h3>Progress</h3>
    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <h3>Incomplete Tasks</h3>
    <ul id="incompleteList"></ul>

    <h3>Completed Tasks</h3>
    <ul id="completeList"></ul>
</div>

<script>

let totalTasks = 0;
let completedTasks = 0;

function addTask() {
    let input = document.getElementById("taskInput");
    let dateInput = document.getElementById("dueDate");
    let priorityInput = document.getElementById("priority");

    let text = input.value;
    let dueDate = dateInput.value;
    let priority = priorityInput.value;

    if (text === "") {
        alert("Enter task!");
        return;
    }

    totalTasks++;

    let li = document.createElement("li");

    let span = document.createElement("span");
    span.innerHTML = text + 
        "<br><small>📅 " + dueDate + " | ⚡ " + priority + "</small>";

    // Priority color
    if (priority === "high") li.style.borderLeft = "5px solid red";
    else if (priority === "medium") li.style.borderLeft = "5px solid orange";
    else li.style.borderLeft = "5px solid green";

    // Complete button
    let completeBtn = document.createElement("button");
    completeBtn.innerHTML = "✔️";

    completeBtn.onclick = function () {
        document.getElementById("completeList").appendChild(li);

        completedTasks++;
        updateProgress();

        completeBtn.remove();
    };

    // Delete button (FIXED BUG HERE)
    let deleteBtn = document.createElement("button");
    deleteBtn.innerHTML = "🗑️";

    deleteBtn.onclick = function () {

        // If task is completed, reduce completed count
        if (li.parentElement.id === "completeList") {
            completedTasks--;
        }

        totalTasks--;

        li.remove();
        updateProgress();
    };

    li.appendChild(span);
    li.appendChild(completeBtn);
    li.appendChild(deleteBtn);

    document.getElementById("incompleteList").appendChild(li);

    input.value = "";
    dateInput.value = "";

    updateProgress();
}

function updateProgress() {
    let percent = totalTasks === 0 ? 0 : (completedTasks / totalTasks) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

</script>

</body>
</html>
